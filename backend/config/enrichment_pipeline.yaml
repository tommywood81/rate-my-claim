# Enrichment pipeline tuning (non-secret). Override path via ENRICHMENT_PIPELINE_CONFIG.
# Restart API/Celery after edits (config is loaded once per process).

retrieval:
  # Neighbor-claim evidence borrow is disabled — sources come from reputable web fetch instead.
  borrow_from_similar_claims: false
  # Legacy keys (unused when borrow is false):
  min_similarity: 0.72
  similar_claim_search_limit: 12
  max_similar_claims: 6
  evidence_line_limit: 10
  excerpt_max_chars: 500
  context_max_chars: 6000
  digest_line_limit: 10

sources:
  enabled: true
  max_sources: 3
  excerpt_max_chars: 320
  min_publisher_credibility: 0.70
  search_result_limit: 20
  fetch_timeout_seconds: 10.0
  allowlist_config_path: config/reputable_sources.yaml

crawl:
  # Max pending URL ingestion jobs processed per enrichment run.
  max_url_jobs: 6
  # Concurrent HTTP fetches (semaphore).
  parallel_fetches: 4
  # Per-URL timeout (seconds); slow URLs are skipped.
  per_url_timeout_seconds: 8.0
  # Wall-clock cap for all URL jobs in one run.
  total_crawl_budget_seconds: 25.0
  # HTTP client timeout passed to HtmlExtractor.
  http_timeout_seconds: 10.0
  # Truncate extracted HTML text before chunking/storage.
  max_extracted_chars: 18000
  # Verdict context excerpt from each artifact (not full cleaned_content).
  artifact_excerpt_chars: 2500
  # Embed full document vector on hot path (needed for artifact.embedding column).
  embed_document_on_hot_path: true
  # When true, skip per-chunk embedding during enrichment (chunks stored without vectors).
  skip_chunk_embeddings_on_hot_path: true
  # If skip_chunk_embeddings is false, cap how many chunks get embedded.
  max_chunks_to_embed: 2

ai:
  # One reasoning call returns scores + verdict (OpenAI provider). Falls back to two calls if unsupported.
  use_combined_assessment: true
  # Skip separate summarize_evidence call; use verdict_summary (or rationale) as ai_summary.
  skip_evidence_summary_call: true
  # When false, run structured_verdict even with an empty library (recommended).
  use_provisional_verdict_without_corpus: false
  # Max chars passed into combined/summary prompts beyond context caps.
  prompt_claim_max_chars: 8000

truth:
  # Public truth defaults to supported/refuted; inconclusive only in narrow edge bands (~1% target).
  supported_aggregate_min: 0.55
  refuted_aggregate_max: 0.45
  inconclusive_aggregate_low: 0.47
  inconclusive_aggregate_high: 0.53
  high_controversy_for_inconclusive: 0.72
  contested_aggregate_low: 0.42
  contested_aggregate_high: 0.58
