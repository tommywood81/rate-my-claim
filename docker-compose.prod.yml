# Production overrides — use with base compose:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Before first run: copy .env.production.example → .env and place TLS certs under ./nginx/certs/

services:
  backend:
    volumes: []
    command: >
      sh -c "alembic upgrade head &&
      python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    restart: unless-stopped

  celery:
    volumes: []
    command: python -m celery -A app.workers.celery_app worker -l INFO --concurrency=4
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    volumes: []
    environment:
      NODE_ENV: production
    restart: unless-stopped

  nginx:
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped

  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped
